[[models]]
model_id = "sentence-transformers/all-MiniLM-L6-v2"
optimal_hardware = ["CPU", "RockX", "NPU", "Mobile (ARM64)"]
parameters = "22.7M"
technologies = ["BERT", "Knowledge Distillation", "Mean Pooling"]
description = "Lightweight baseline. Optimized for edge/mobile. High speed, low footprint."

[models.onnx_variants]
"model.onnx" = "FP32 fallback."
"model_O4.onnx" = "FP16 optimized for GPU/Vulkan/Metal."
"model_qint8_arm64.onnx" = "INT8 compiled for ARM64 architectures."
"model_qint8_avx512_vnni.onnx" = "INT8 optimized for AVX512 CPUs."

[[models]]
model_id = "intfloat/e5-base-v2"
optimal_hardware = ["CPU (AVX512)", "CUDA", "Vulkan", "Metal"]
parameters = "109M"
technologies = ["BERT", "Contrastive Learning", "Prefix prompting"]
description = "English-only model. Requires 'query:' or 'passage:' prefixes. Strong performance-to-memory ratio."

[models.onnx_variants]
"model.onnx" = "Base FP32 graph."
"model_O4.onnx" = "FP16 optimized graph for mid-range GPUs."
"model_qint8_avx512_vnni.onnx" = "INT8 quantized for AVX512 CPUs."

[[models]]
model_id = "intfloat/multilingual-e5-base"
optimal_hardware = ["CPU (AVX512)", "CUDA", "Vulkan", "Metal"]
parameters = "278M"
technologies = ["XLM-RoBERTa", "Contrastive Learning", "Prefix prompting"]
description = "Multilingual E5 variant. Heavy XLM-R vocabulary. GPU acceleration recommended."

[models.onnx_variants]
"model.onnx" = "Base FP32 graph."
"model_O4.onnx" = "FP16 optimized for dedicated GPUs."
"model_qint8_avx512_vnni.onnx" = "INT8 optimized for CPU inference."

[[models]]
model_id = "nomic-ai/nomic-embed-text-v1.5"
optimal_hardware = ["CUDA", "Vulkan", "Metal", "CPU"]
parameters = "137M"
technologies = ["MRL", "RoPE", "8192 Context"]
description = "Supports dynamic embedding dimension reduction (MRL) and long context (8192 tokens)."

[models.onnx_variants]
"model.onnx" = "Base FP32 graph."
"model_fp16.onnx" = "Native FP16 for Tensor Cores."
"model_int8.onnx" = "Generic INT8 for CPUs."
"model_q4f16.onnx" = "4-bit quantization with FP16 activations. Strict VRAM limits."

[[models]]
model_id = "Alibaba-NLP/gte-large-en-v1.5"
optimal_hardware = ["CUDA (TensorRT)", "Vulkan", "Metal"]
parameters = "334M"
technologies = ["Enhanced BERT", "LayerNorm Optimizations", "8192 Context"]
description = "Large-scale English embedding. Top-tier retrieval, heavy compute requirements."

[models.onnx_variants]
"model.onnx" = "Standard FP32 graph."
"model_fp16.onnx" = "FP16 optimized graph for high-end GPUs."
"model_int8.onnx" = "8-bit quantization for CPU fallback."
"model_uint8.onnx" = "Unsigned 8-bit for NPUs (e.g., RockX)."
"model_bnb4.onnx" = "BitsAndBytes 4-bit quantization. Maximum compression."
